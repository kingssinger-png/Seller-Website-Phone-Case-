<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ GirlyCase Co. | Aesthetic Phone Cases ✨</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --pink-light: #FFE5EC;
            --pink-main: #FF8FAB;
            --pink-dark: #FB6F92;
            --purple-light: #F0E6FF;
            --text-color: #2B2D42;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--pink-light);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        /* 顶部横幅 */
        header {
            background: linear-gradient(135deg, var(--pink-main), var(--pink-dark));
            color: white;
            text-align: center;
            padding: 40px 20px;
            box-shadow: 0 4px 15px rgba(251, 111, 146, 0.3);
        }

        header h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 3rem;
            margin: 0;
            text-shadow: 2px 2px 0px #FF5C8A;
            letter-spacing: 1px;
        }

        header p {
            font-size: 1.1rem;
            margin: 10px 0 0 0;
            opacity: 0.9;
        }

        /* 商品展示区域 */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
        }

        /* 商品卡片样式 */
        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 3px solid white;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--pink-main);
            box-shadow: 0 12px 25px rgba(251, 111, 146, 0.15);
        }

        /* 手机壳虚拟图片占位框 */
        .product-image {
            width: 100%;
            height: 240px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin-bottom: 15px;
            background: var(--purple-light);
        }

        /* 给不同的手机壳不同的多巴胺背景色 */
        .case-1 { background: #FFC6FF; }
        .case-2 { background: #BDB2FF; }
        .case-3 { background: #CAFFBF; }
        .case-4 { background: #FDFFB6; }
        .case-5 { background: #FFADAD; }

        .product-title {
            font-size: 1.2rem;
