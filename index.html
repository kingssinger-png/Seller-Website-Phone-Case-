<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ GirlyCase Co. | Aesthetic Phone Cases ✨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --pink-light: #FFE5EC;
            --pink-main: #FF8FAB;
            --pink-dark: #FB6F92;
            --purple-light: #F0E6FF;
            --text-color: #2B2D42;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--pink-light);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            background: linear-gradient(135deg, var(--pink-main), var(--pink-dark));
            color: white;
            text-align: center;
            padding: 40px 20px;
            box-shadow: 0 4px 15px rgba(251, 111, 146, 0.3);
            position: relative;
        }

        header h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 3rem;
            margin: 0;
            text-shadow: 2px 2px 0px #FF5C8A;
        }

        .cart-icon-container {
            position: absolute;
            top: 20px;
            right: 30px;
            background: white;
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-badge {
            background: var(--pink-dark);
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 0.8rem;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 3px solid white;
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--pink-main);
        }

        .product-image {
            width: 100%;
            height: 240px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .case-1 { background: #FFC6FF; }
        .case-2 { background: #BDB2FF; }
        .case-3 { background: #CAFFBF; }
        .case-4 { background: #FDFFB6; }
        .case-5 { background: #FFADAD; }

        .product-title { font-size: 1.2rem; font-weight: 600; margin: 10px 0 5px 0; }
        .product-price { font-size: 1.3rem; color: var(--pink-dark); font-weight: 700; margin-bottom: 15px; }

        .add-to-cart-btn {
            background-color: var(--pink-dark);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .add-to-cart-btn:hover { background-color: #E05375; }

        footer { text-align: center; padding: 40px 20px; color: #888; }
    </style>
</head>
<body>

    <header>
        <h1>✨ GirlyCase Co. ✨</h1>
        <p>Aesthetic phone cases for IT Girls • All Only $1.00</p>
        
        <div class="cart-icon-container" onclick="checkout()">
            🛍️ Checkout <span class="cart-badge" id="cart-count">0</span>
        </div>
    </header>

    <div class="container">
        <div class="grid">
            
            <div class="product-card">
                <div class="product-image case-1">🌸</div>
                <div class="product-title">Pink Y2K Bow Case</div>
                <div class="product-price">$1.00</div>
                <button class="add-to-cart-btn" onclick="addToCart('price_1TeVTKRdlyHN6o9BiMuadh0O', 'Pink Y2K Bow Case')">Add to Cart 💖</button>
            </div>

            <div class="product-card">
                <div class="product-image case-2">💜</div>
                <div class="product-title">Purple Butterfly Dream</div>
                <div class="product-price">$1.00</div>
                <button class="add-to-cart-btn" onclick="addToCart('price_1TeVTcRdlyHN6o9BPkNU9lrp', 'Purple Butterfly Dream')">Add to Cart 💖</button>
            </div>

            <div class="product-card">
                <div class="product-image case-3">🐱</div>
                <div class="product-title">Matcha Matcha Cat</div>
                <div class="product-price">$1.00</div>
                <button class="add-to-cart-btn" onclick="addToCart('price_1TeVTtRdlyHN6o9Bgzm5mDly', 'Matcha Matcha Cat')">Add to Cart 💖</button>
            </div>

            <div class="product-card">
                <div class="product-image case-4">🌟</div>
                <div class="product-title">Sparkle Like Star</div>
                <div class="product-price">$1.00</div>
                <button class="add-to-cart-btn" onclick="addToCart('price_1TeVUFRdlyHN6o9BtKMczLvk', 'Sparkle Like Star')">Add to Cart 💖</button>
            </div>

            <div class="product-card">
                <div class="product-image case-5">🍒</div>
                <div class="product-title">Vintage Cherry Pop</div>
                <div class="product-price">$1.00</div>
                <button class="add-to-cart-btn" onclick="addToCart('price_1TeVUWRdlyHN6o9Be2i1p03C', 'Vintage Cherry Pop')">Add to Cart 💖</button>
            </div>

        </div>
    </div>

    <footer><p>© 2026 GirlyCase Co.</p></footer>

    <script>
        let cart = JSON.parse(localStorage.getItem('girly_cart')) || [];

        function updateCartBadge() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-count').innerText = totalItems;
        }

        function addToCart(priceId, name) {
            const existingItem = cart.find(item => item.priceId === priceId);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ priceId: priceId, quantity: 1, name: name });
            }
            localStorage.setItem('girly_cart', JSON.stringify(cart));
            updateCartBadge();
            alert(`🎉 Added ${name} to your cart!`);
        }

        async function checkout() {
            if (cart.length === 0) {
                alert("Your cart is empty! Add some cute cases first 🛍️");
                return;
            }

            const response = await fetch('/api/checkout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cart: cart })
            });

            const session = await response.json();
            if (session.url) {
                localStorage.removeItem('girly_cart');
                window.location.href = session.url;
            } else {
                alert("Something went wrong. Please try again.");
            }
        }

        updateCartBadge();
    </script>
</body>
</html>
